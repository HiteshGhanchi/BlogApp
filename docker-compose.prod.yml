version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - blog_network_prod

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - blog_network_prod

  backend:
    image: ${ECR_REGISTRY}/blog_backend:latest
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - blog_network_prod

  frontend:
    image: ${ECR_REGISTRY}/blog_frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - blog_network_prod

volumes:
  pgdata:


networks:
  blog_network_prod:
    driver: bridge
